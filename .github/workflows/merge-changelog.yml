# yamllint disable rule:line-length
# yamllint disable rule:truthy
---
# Merges docs/changelog/soon/{laminhub-public,blog}.md into docs/changelog/2026.md and opens a PR.
# Triggered by repository_dispatch from laminhub-public and lamin-blog.
on:
  workflow_dispatch:
    inputs:
      source:
        description: "Changelog source"
        required: true
        type: choice
        options:
          - laminhub-public
          - blog
        default: laminhub-public
      tag_name:
        description: "Release tag for laminhub-public (e.g. 1.15.3 or v1.15.3)"
        required: false
        type: string
      published_at:
        description: "Release date ISO 8601 (e.g. 2026-02-12)"
        required: true
        type: string
  repository_dispatch:
    types:
      - laminhub-public-release
      - lamin-blog-dispatch

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'repository_dispatch' && (github.event.action == 'laminhub-public-release' || github.event.action == 'lamin-blog-dispatch'))
    runs-on: ubuntu-latest
    env:
      REPO: ${{ github.repository }}
      GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - name: Resolve tag and date
        id: resolve
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            ACTION="${{ github.event.action }}"
            case "$ACTION" in
              laminhub-public-release)
                SOURCE="laminhub-public"
                ;;
              lamin-blog-dispatch)
                SOURCE="blog"
                ;;
              *)
                echo "Unsupported repository_dispatch action: $ACTION"
                exit 1
                ;;
            esac
            TAG_RAW="${{ github.event.client_payload.tag_name }}"
            PUBLISHED="${{ github.event.client_payload.published_at }}"
          else
            SOURCE="${{ inputs.source }}"
            TAG_RAW="${{ inputs.tag_name }}"
            PUBLISHED="${{ inputs.published_at }}"
          fi
          test -n "$PUBLISHED" || { echo "published_at is required"; exit 1; }
          TAG=""
          if [ "$SOURCE" = "laminhub-public" ]; then
            test -n "$TAG_RAW" || { echo "tag_name is required for laminhub-public"; exit 1; }
            # Strip leading v if present
            TAG="${TAG_RAW#v}"
          fi
          # Format date as YYYY-MM-DD (handle full ISO 8601)
          DATE_STR=$(echo "$PUBLISHED" | cut -d'T' -f1)
          SOON_FILE="docs/changelog/soon/${SOURCE}.md"
          if [ "$SOURCE" = "laminhub-public" ]; then
            HEADING_SUFFIX="hub ${TAG}"
          else
            HEADING_SUFFIX="blog"
          fi
          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "date_str=$DATE_STR" >> "$GITHUB_OUTPUT"
          echo "soon_file=$SOON_FILE" >> "$GITHUB_OUTPUT"
          echo "heading_suffix=$HEADING_SUFFIX" >> "$GITHUB_OUTPUT"

      - name: Check soon file has content
        id: check
        run: |
          SOON_FILE="${{ steps.resolve.outputs.soon_file }}"
          if [ ! -f "$SOON_FILE" ] || [ ! -s "$SOON_FILE" ]; then
            echo "soon=$SOON_FILE is missing or empty; skipping merge (no-op)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Merge soon changelog into 2026.md
        if: steps.check.outputs.skip != 'true'
        run: |
          python3 - "${{ steps.resolve.outputs.soon_file }}" "docs/changelog/2026.md" "${{ steps.resolve.outputs.date_str }}" "${{ steps.resolve.outputs.heading_suffix }}" "${{ steps.resolve.outputs.source }}" <<'PY'
          import json
          import re
          import sys
          import urllib.request
          from html import escape
          from pathlib import Path

          EMOJI_SHORTCODE_RE = re.compile(r"^:(?P<name>[a-z0-9_+\-]+):\s+(?P<rest>.+)$")
          EMOJI_UNICODE_NAME_MAP = {
              "✨": "sparkles",
              "🐛": "bug",
              "🚸": "children_crossing",
              "⚡": "zap",
              "⚡️": "zap",
          }
          ICON_PRIORITY = {
              "sparkles": 0,
              "children_crossing": 1,
              "zap": 2,
              "bug": 3,
          }

          def _looks_like_unicode_icon(token: str) -> bool:
              if not token:
                  return False
              return any(ord(ch) >= 0x2600 for ch in token if ch not in {"\ufe0f", "\u200d"})

          def _twemoji_url(token: str) -> str | None:
              codepoints = [f"{ord(ch):x}" for ch in token if ch not in {"\ufe0f", "\u200d"}]
              if not codepoints:
                  return None
              return (
                  "https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/"
                  + "-".join(codepoints)
                  + ".svg"
              )

          def _emoji_image(name: str, url: str | None) -> str:
              if not url:
                  return f":{name}:"
              return (
                  f'<img src="{url}" alt=":{escape(name)}:" width="16" height="16" '
                  'style="vertical-align:text-bottom;" />'
              )

          def _extract_icon(body: str, emoji_urls: dict[str, str]) -> tuple[str | None, str]:
              shortcode_match = EMOJI_SHORTCODE_RE.match(body)
              if shortcode_match:
                  name = shortcode_match.group("name")
                  rest = shortcode_match.group("rest")
                  image = _emoji_image(name, emoji_urls.get(name))
                  return name, f"{image} {rest}"

              token, sep, rest = body.partition(" ")
              if not sep:
                  return None, body
              mapped_name = EMOJI_UNICODE_NAME_MAP.get(token)
              if mapped_name:
                  image = _emoji_image(mapped_name, emoji_urls.get(mapped_name))
                  return mapped_name, f"{image} {rest}"
              if _looks_like_unicode_icon(token):
                  twemoji_url = _twemoji_url(token)
                  image = _emoji_image(token, twemoji_url)
                  return token, f"{image} {rest}"
              return None, body

          def _sort_and_render_bullets(content: str) -> str:
              lines = content.splitlines()
              bullet_rows: list[tuple[int, str, str]] = []
              for idx, line in enumerate(lines):
                  if line.startswith("- "):
                      bullet_rows.append((idx, line[2:], line))

              if not bullet_rows:
                  return content

              try:
                  with urllib.request.urlopen("https://api.github.com/emojis", timeout=10) as response:
                      emoji_urls = json.loads(response.read().decode("utf-8"))
              except Exception:
                  emoji_urls = {}

              decorated: list[tuple[int, str, int, str]] = []
              for idx, body, original_line in bullet_rows:
                  icon_key, rendered_body = _extract_icon(body, emoji_urls)
                  if icon_key:
                      priority = ICON_PRIORITY.get(icon_key, 3)
                      key = icon_key
                      rendered_line = f"- {rendered_body}"
                  else:
                      priority = 4
                      key = "\uffff"
                      rendered_line = original_line
                  decorated.append((priority, key, idx, rendered_line))

              decorated.sort(key=lambda row: (row[0], row[1], row[2]))
              sorted_lines = [line for _, _, _, line in decorated]

              output = lines[:]
              for (original_idx, _, _), new_line in zip(bullet_rows, sorted_lines, strict=True):
                  output[original_idx] = new_line
              return "\n".join(output)

          def _normalize_blog_bullets(content: str) -> str:
              lines = []
              for line in content.splitlines():
                  if line.startswith("- :memo: "):
                      lines.append("- 📝 " + line[len("- :memo: "):])
                  else:
                      lines.append(line)
              return "\n".join(lines)

          soon_path = Path(sys.argv[1])
          changelog_path = Path(sys.argv[2])
          date_str = sys.argv[3]
          heading_suffix = sys.argv[4]
          source = sys.argv[5]
          raw_content = soon_path.read_text().strip()
          if source == "laminhub-public":
              content = _sort_and_render_bullets(raw_content)
          elif source == "blog":
              content = _normalize_blog_bullets(raw_content)
          else:
              content = raw_content
          heading = f"## {date_str} {{small}}`{heading_suffix}`"
          new_section = f"{heading}\n\n{content}\n\n"
          text = changelog_path.read_text()
          idx = text.find("\n## ")
          if idx == -1:
              raise SystemExit("No '## ' heading found in changelog")
          before = text[: idx + 1]
          after = text[idx + 1:]
          changelog_path.write_text(before + new_section + after)
          PY

      - name: Clear soon file
        if: steps.check.outputs.skip != 'true'
        run: |
          echo -n '' > "${{ steps.resolve.outputs.soon_file }}"

      - name: Create branch, commit, push
        if: steps.check.outputs.skip != 'true'
        env:
          SOURCE: ${{ steps.resolve.outputs.source }}
          TAG: ${{ steps.resolve.outputs.tag }}
          DATE_STR: ${{ steps.resolve.outputs.date_str }}
          SOON_FILE: ${{ steps.resolve.outputs.soon_file }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          RUN_ID_SHORT=${GITHUB_RUN_ID:0:8}
          [ -n "$RUN_ID_SHORT" ] || RUN_ID_SHORT=$GITHUB_RUN_ID
          if [ "$SOURCE" = "laminhub-public" ]; then
            BRANCH="chore/changelog/merge-laminhub-public-${TAG}-${RUN_ID_SHORT}"
            COMMIT_SUBJECT="chore(changelog): merge laminhub-public ${TAG} (${DATE_STR}) into 2026.md"
          else
            BRANCH="chore/changelog/merge-blog-${DATE_STR}-${RUN_ID_SHORT}"
            COMMIT_SUBJECT="chore(changelog): merge blog (${DATE_STR}) into 2026.md"
          fi
          git checkout -b "$BRANCH" origin/main
          git add docs/changelog/2026.md "$SOON_FILE"
          git commit -m "$COMMIT_SUBJECT"
          git push -u origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_ENV"

      - name: Open PR
        if: steps.check.outputs.skip != 'true'
        id: open_pr
        env:
          BRANCH: ${{ env.branch }}
          SOURCE: ${{ steps.resolve.outputs.source }}
          TAG: ${{ steps.resolve.outputs.tag }}
          DATE_STR: ${{ steps.resolve.outputs.date_str }}
          SOON_FILE: ${{ steps.resolve.outputs.soon_file }}
        run: |
          if [ "$SOURCE" = "laminhub-public" ]; then
            TITLE="🔖 Hub ${TAG}"
          else
            TITLE="📝 Blog ${DATE_STR}"
          fi
          gh pr create \
            --repo "$REPO" \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body "Prepends content from ${SOON_FILE} to docs/changelog/2026.md and clears the soon file."

      - name: Merge PR into main
        if: steps.check.outputs.skip != 'true'
        env:
          BRANCH: ${{ env.branch }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge "$BRANCH" --repo "$REPO" --squash
